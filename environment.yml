name: voyager
channels:
  - conda-forge
  - defaults
dependencies:
  # Core Python
  - python=3.11

  # Web framework
  - streamlit

  # LLM providers
  - anthropic

  # LangChain ecosystem
  - langchain
  - langchain-core
  - langchain-anthropic
  - langchain-openai
  - langchain-text-splitters

  # Scientific computing
  - numpy
  - scipy

  # Space science
  - skyfield
  - geopy

  # Utilities
  - requests
  - python-dotenv
  - pydantic

  # Pip-only
  - pip
  - pip:
    - openai>=1.0
